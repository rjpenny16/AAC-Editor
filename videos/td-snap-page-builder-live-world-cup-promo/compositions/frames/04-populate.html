    window.__timelines = window.__timelines || {};

    const byId = (id) => document.getElementById(id);

    const video = byId("f04-populate-video");

    const markerPath = byId("f04-populate-marker-path");
    const count = byId("f04-populate-count");
    const tl = gsap.timeline({ paused: true });

    tl.fromTo(
      surface,
      { scale: 0.972, rotateY: -2.4, rotateX: 1.2, transformPerspective: 1600, opacity: 0.72 },
      { scale: 1, rotateY: 0, rotateX: 0, opacity: 1, duration: 0.58, ease: "power3.out" },
      0,
    );
    if (video) {
      tl.fromTo(
        video,
        { scale: 0.972, rotateY: -2.4, rotateX: 1.2, transformPerspective: 1600, opacity: 0.74 },
        { scale: 1, rotateY: 0, rotateX: 0, opacity: 1, duration: 0.58, ease: "power3.out" },
        0,
      );
    }
    tl.fromTo(wash, { opacity: 0.86 }, { opacity: 0, duration: 0.52, ease: "power3.out" }, 0.02);
    tl.fromTo(
      titleTab,
      { y: -10, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.42, ease: "power3.out" },
      0.18,
    );
    tl.fromTo(
      rail,
      { x: -18, opacity: 0 },
      { x: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
      0.78,
    );

    tl.to(surface, { scale: 1.018, duration: 3.4, ease: "power3.out" }, 1.3);
    if (video) {
      tl.to(video, { scale: 1.018, duration: 3.4, ease: "power3.out" }, 1.3);
    }

    const railDriver = { t: 0 };
    const applyRailState = (time) => {
      const active = Math.min(4, Math.floor(time / 0.72));
      railItems.forEach((item, index) => {
        const selected = index === active;
        item.style.backgroundColor = selected ? "rgba(11, 97, 223, 0.08)" : "#ffffff";
        item.style.borderColor = selected ? "#0b61df" : "rgba(11, 97, 223, 0.2)";
        item.style.color = selected ? "#0b1b42" : "#425b7a";
        item.style.opacity = index <= active ? "1" : "0.46";
        item.querySelector("[class~='04-populate-rail-mark']").style.opacity = selected ? "1" : "0";
      });
    };
    applyRailState(0);
    tl.to(
      railDriver,
      {
        t: 3.6,
        duration: 3.6,
        ease: "none",
        onUpdate: () => applyRailState(railDriver.t),
      },
      1.3,
    );

    if (video) {
      tl.to(video, { scale: 0.985, opacity: 0, duration: 0.38, ease: "power2.in" }, 4.86);
    }
    tl.fromTo(
      proof,
      { scale: 0.985, opacity: 0 },
      { scale: 1, opacity: 1, duration: 0.58, ease: "power3.out" },

    tl.to(surface, { scale: 1, duration: 0.58, ease: "power3.out" }, 4.92);

      markerPath,
