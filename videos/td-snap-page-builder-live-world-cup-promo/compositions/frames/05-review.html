      <div data-hf-id="hf-vel5" id="root" data-composition-id="05-review" data-width="1920" data-height="1080" data-duration="6.4" data-fps="30">
        <div data-hf-id="hf-85go" id="f05-review-ground" class="clip f05-review-ground" data-start="0" data-duration="6.4" data-track-index="0"></div>

        <!-- approved frame video hoisted by assemble-index -->

        <div data-hf-id="hf-87cy" id="f05-review-overlay" class="clip f05-review-overlay" data-start="0" data-duration="6.4" data-track-index="2">
          <div data-hf-id="hf-2xh6" id="f05-review-eyebrow" class="f05-review-eyebrow">Review</div>
          <div data-hf-id="hf-ikzg" id="f05-review-rule" class="f05-review-rule"></div>

          <div data-hf-id="hf-rary" id="f05-review-review-stage" class="f05-review-review-stage">
            <div data-hf-id="hf-avw1" id="f05-review-review-world" class="f05-review-review-world" data-layout-allow-overflow="">

              <div data-hf-id="hf-zvxw" id="f05-review-zoom-inner" class="f05-review-zoom-inner">

                <div data-hf-id="hf-22vy" id="f05-review-update-target" class="f05-review-update-target"></div>

            </div>
          </div>

          <div data-hf-id="hf-4iia" id="f05-review-video-frame" class="f05-review-video-frame"></div>

              <path data-hf-id="hf-oopq" d="M5 3L22 14L14.2 15.2L10.5 23L5 3Z" fill="#0b61df" stroke="#0b1b42" stroke-width="1.2" />

          <div data-hf-id="hf-vsua" class="f05-review-progress-track">

          </div>
        </div>
      </div>

      <script src="assets/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const eyebrow = document.getElementById("f05-review-eyebrow");
        const rule = document.getElementById("f05-review-rule");
        const reviewStage = document.getElementById("f05-review-review-stage");
        const reviewWorld = document.getElementById("f05-review-review-world");
        const updateStage = document.getElementById("f05-review-update-stage");
        const zoomOuter = document.getElementById("f05-review-zoom-outer");
        const zoomInner = document.getElementById("f05-review-zoom-inner");
        const frame = document.getElementById("f05-review-video-frame");
        const spotlight = document.getElementById("f05-review-spotlight");
        const cursor = document.getElementById("f05-review-cursor");
        const target = document.getElementById("f05-review-update-target");
        const ripples = [
          document.getElementById("f05-review-ripple-one"),
          document.getElementById("f05-review-ripple-two"),
          document.getElementById("f05-review-ripple-three"),
        ];
        const state = document.getElementById("f05-review-state");
        const progress = document.getElementById("f05-review-progress-fill");

        tl.set([reviewStage, updateStage, spotlight, cursor, target, state, ...ripples], { opacity: 0 }, 0);

        tl.fromTo(
          frame,
          { opacity: 0, scale: 0.992 },
          { opacity: 1, scale: 1, duration: 0.48, ease: "power3.out", immediateRender: false },
          0,
        );
        tl.fromTo(
          eyebrow,
          { opacity: 0, x: -18 },
          { opacity: 1, x: 0, duration: 0.38, ease: "power3.out", immediateRender: false },
          0.12,
        );
        tl.fromTo(
          rule,
          { opacity: 0, scaleX: 0 },
          { opacity: 1, scaleX: 1, duration: 0.58, ease: "power3.out", immediateRender: false },
          0.28,
        );

        tl.fromTo(
          reviewStage,
          { opacity: 0 },
          { opacity: 1, duration: 0.16, ease: "power2.out", immediateRender: false },
          1.24,
        );
        tl.fromTo(
          spotlight,
          { opacity: 0, scaleX: 0.12, y: 0 },
          { opacity: 1, scaleX: 1, y: 0, duration: 0.5, ease: "power3.out", immediateRender: false },
          1.4,
        );
        tl.fromTo(
          cursor,
          { opacity: 0, x: 965, y: 292, scale: 0.88 },
          { opacity: 1, x: 933, y: 330, scale: 1, duration: 0.46, ease: "power3.out", immediateRender: false },
          1.42,
        );
        tl.to(spotlight, { y: 314, duration: 1.55, ease: "power3.inOut" }, 1.96);
        tl.to(cursor, { x: 930, y: 646, duration: 1.55, ease: "power3.inOut" }, 1.96);
        tl.to(reviewWorld, { y: -38, duration: 1.55, ease: "power3.inOut" }, 1.96);

        tl.fromTo(
          updateStage,
          { opacity: 0 },
          { opacity: 1, duration: 0.18, ease: "power2.out", immediateRender: false },
          3.58,
        );
        tl.to(spotlight, { opacity: 0, duration: 0.18, ease: "power2.out" }, 3.58);
        tl.to(zoomOuter, { scale: 1.25, duration: 0.74, ease: "power3.inOut" }, 3.7);
        tl.to(zoomInner, { x: 135, y: -312, duration: 0.74, ease: "power3.inOut" }, 3.7);
        tl.to(cursor, { x: 1046, y: 484, duration: 0.65, ease: "power3.inOut" }, 3.78);
        tl.fromTo(
          target,
          { opacity: 0, scale: 1.08 },
          { opacity: 1, scale: 1, duration: 0.32, ease: "power3.out", immediateRender: false },
          4.1,
        );

        tl.to(cursor, { scale: 0.84, duration: 0.1, ease: "power1.in" }, 4.52);
        tl.to(target, { scale: 0.95, duration: 0.1, ease: "power1.in" }, 4.52);
        tl.to(cursor, { scale: 1, duration: 0.42, ease: "back.out(1.45)" }, 4.62);
        tl.to(target, { scale: 1, duration: 0.42, ease: "back.out(1.45)" }, 4.62);
        tl.set(ripples, { opacity: 0.8, scale: 0.25 }, 4.54);
        tl.to(
          ripples,
          {
            opacity: 0,
            scale: 4.2,
            duration: 0.68,
            ease: "power3.out",
            stagger: 0.08,
            immediateRender: false,
          },
          4.54,
        );

        tl.to(zoomOuter, { scale: 1, duration: 0.38, ease: "power3.inOut" }, 5.12);
        tl.to(zoomInner, { x: 0, y: 0, duration: 0.38, ease: "power3.inOut" }, 5.12);
        tl.to(cursor, { opacity: 0, duration: 0.2, ease: "power2.out" }, 5.12);
        tl.to(target, { opacity: 0, duration: 0.2, ease: "power2.out" }, 5.12);
        tl.fromTo(
          state,
          { opacity: 0, x: -18 },
          { opacity: 1, x: 0, duration: 0.48, ease: "power3.out", immediateRender: false },
          5.3,
        );
        tl.to([eyebrow, rule], { opacity: 0, duration: 0.2, ease: "power2.out" }, 5.3);

        tl.fromTo(
          progress,
          { scaleX: 0.57 },
          { scaleX: 0.71, duration: 6, ease: "none", immediateRender: false },
          0,
        );

        window.__timelines["05-review"] = tl;
      </script>
    </template>
