      <script src="assets/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const active = document.getElementById("f03-setup-active");
        const stepOne = document.getElementById("f03-setup-step-one");
        const stepTwo = document.getElementById("f03-setup-step-two");
        const stepThree = document.getElementById("f03-setup-step-three");
        const focus = document.getElementById("f03-setup-focus");
        const cursor = document.getElementById("f03-setup-cursor");
        const rippleOne = document.getElementById("f03-setup-ripple-one");
        const rippleTwo = document.getElementById("f03-setup-ripple-two");
        const trackBox = document.getElementById("f03-setup-track-box");
        const matchTag = document.getElementById("f03-setup-match-tag");
        const finalStill = document.getElementById("f03-setup-final-still");
        const progress = document.getElementById("f03-setup-progress-fill");

        const railEntries = [
          { element: stepOne, text: "NEW PAGE" },
          { element: stepTwo, text: "TOPIC" },
          { element: stepThree, text: "READY" },
        ];
        const baseReveal = 0.16;
        const secondsPerCharacter = 0.018;
        const railDurations = railEntries.map((entry) => baseReveal + entry.text.length * secondsPerCharacter);
        const railTotal = railDurations.reduce((sum, duration) => sum + duration, 0);
        let railCursor = 0.08;

        tl.set(
          [stepOne, stepTwo, stepThree, focus, cursor, rippleOne, rippleTwo, trackBox, matchTag, finalStill],
          { opacity: 0 },
          0,
        );

        railEntries.forEach((entry, index) => {
          const duration = railDurations[index];
          tl.fromTo(
            entry.element,
            { opacity: 0, x: -22 },
            { opacity: 1, x: 0, duration, ease: "power3.out", immediateRender: false },
            railCursor,
          );
          railCursor += duration;
        });

        tl.fromTo(
          ".f03-setup-video-frame",
          { opacity: 0, scale: 0.992 },
          { opacity: 1, scale: 1, duration: Math.min(0.5, railTotal), ease: "power3.out", immediateRender: false },
          0,
        );
        tl.fromTo(
          focus,
          { opacity: 0, x: 0, y: 0, scale: 1.08 },
          { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.36, ease: "power3.out", immediateRender: false },
          1.5,
        );
        tl.fromTo(
          cursor,
          { opacity: 0, x: 360, y: 430, scale: 0.84 },
          { opacity: 1, x: 530, y: 292, scale: 1, duration: 0.55, ease: "power3.out", immediateRender: false },
          1.42,
        );
        tl.to(cursor, { scale: 0.86, duration: 0.08, ease: "power2.in", yoyo: true, repeat: 1 }, 2.0);
        tl.fromTo(
          rippleOne,
          { opacity: 0.75, scale: 0.2 },
          { opacity: 0, scale: 4.2, duration: 0.65, ease: "power3.out", immediateRender: false },
          2.0,
        );

        tl.to(active, { y: 92, duration: 0.55, ease: "power3.inOut" }, 1.55);
        tl.to(stepOne, { color: "#425b7a", backgroundColor: "rgba(255,255,255,0.88)", borderColor: "rgba(11,97,223,0.2)", duration: 0.2 }, 1.65);
        tl.to(stepTwo, { color: "#ffffff", backgroundColor: "transparent", borderColor: "transparent", duration: 0.2 }, 1.65);

        tl.to(cursor, { x: 528, y: 540, duration: 0.58, ease: "power3.inOut" }, 2.28);
        tl.to(focus, { y: 248, duration: 0.58, ease: "power3.inOut" }, 2.28);
        tl.to(cursor, { scale: 0.86, duration: 0.08, ease: "power2.in", yoyo: true, repeat: 1 }, 2.92);
        tl.fromTo(
          rippleTwo,
          { opacity: 0.75, scale: 0.2 },
          { opacity: 0, scale: 4.2, duration: 0.65, ease: "power3.out", immediateRender: false },
          2.92,
        );

        tl.to(focus, { opacity: 0, duration: 0.22, ease: "power2.out" }, 3.35);
        tl.to(cursor, { x: 556, y: 345, duration: 0.62, ease: "power3.inOut" }, 3.38);
        tl.fromTo(
          trackBox,
          { opacity: 0, scale: 0.82 },
          { opacity: 1, scale: 1, duration: 0.48, ease: "back.out(1.35)", immediateRender: false },
          3.5,
        );
        tl.fromTo(
          matchTag,
          { opacity: 0, y: 18, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "power3.out", immediateRender: false },
          4.45,
        );

        tl.to(active, { y: 184, duration: 0.48, ease: "power3.inOut" }, 5.2);
        tl.to(stepTwo, { color: "#425b7a", backgroundColor: "rgba(255,255,255,0.88)", borderColor: "rgba(11,97,223,0.2)", duration: 0.2 }, 5.25);
        tl.to(stepThree, { color: "#ffffff", backgroundColor: "transparent", borderColor: "transparent", duration: 0.2 }, 5.25);
        tl.to(cursor, { opacity: 0, duration: 0.24, ease: "power2.out" }, 5.18);
        tl.fromTo(
          finalStill,
          { opacity: 0, x: 12, scale: 1.012 },
          { opacity: 1, x: 0, scale: 1, duration: 0.55, ease: "power3.out", immediateRender: false },
          5.2,
        );
        tl.to(trackBox, { opacity: 0, duration: 0.2, ease: "power2.out" }, 5.2);
        tl.to(matchTag, { x: 6, duration: 0.55, ease: "power3.out" }, 5.2);

        tl.fromTo(
          progress,
          { scaleX: 0.285 },
          { scaleX: 0.43, duration: 6, ease: "none", immediateRender: false },
          0,
        );

        window.__timelines["03-setup"] = tl;
      </script>
