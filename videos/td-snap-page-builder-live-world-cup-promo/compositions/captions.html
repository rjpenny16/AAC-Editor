<style>
  #captions-root {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .caption-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  /* the keep-out band, from captionBand(H) — frame content stays above it */
  .caption-stage {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--cap-band-top, 900px);
    height: var(--cap-band-height, 180px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .caption-group {
    /* every group is absolutely stacked over the SAME band — exactly one shown at a
       time via opacity. Must be absolute: in-flow groups would lay out side-by-side. */
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 1;
    visibility: hidden;
  }

  /* THE tinted card — 4% cobalt fill, 1.5px 20%-cobalt border, soft 14px corners,
     NO shadow (the tinted card does the lift; cast depth is forbidden) */
  .caption-pill {
    max-width: 78%;
    padding: 20px 44px 24px;
    background: color-mix(in srgb, var(--cap-accent, #1e2bfa) 4%, var(--cap-canvas, #fdfae7));
    border: 1.5px solid color-mix(in srgb, var(--cap-accent, #1e2bfa) 20%, transparent);
    border-radius: 14px;
  }
  .caption-line {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.1em 0.34em;
    font-family: "Segoe UI Variable Text", system-ui, sans-serif;
    font-weight: 600;
    font-size: clamp(40px, 4.4vw, 58px);
    line-height: 1.16;
    letter-spacing: -0.02em;
  }

  /* upcoming — muted gray, no chip */
  .caption-word {
    display: inline-block;
    padding: 0 0.18em;
    border-radius: 0.32em;
    color: color-mix(in srgb, var(--cap-ink, #111111) 52%, var(--cap-canvas, #fdfae7));
  }
  /* current word — THE solid cobalt chip (the single-accent gesture; pill-rounded
     fill, NO shadow), cream reading on top */
  .caption-word.is-active {
    color: var(--cap-canvas, #fdfae7);
    background: var(--cap-accent, #1e2bfa);
    box-shadow: none;
  }
  /* already spoken — solid near-black ink, chip cleared */
  .caption-word.is-spoken {
    color: var(--cap-ink, #111111);
    background: transparent;
    box-shadow: none;
  }

  /* optional per-word accents (dormant until a word-classer tags them) */
  /* brand / key term — cobalt, the system's one accent on a key word */
  .caption-word.cap-brand {
    color: var(--cap-accent, #1e2bfa);
  }
  /* numerals / data — cobalt 700, the figure voice */
  .caption-word.cap-num {
    font-family: "Segoe UI Variable Text", system-ui, sans-serif;
    font-weight: 700;
    color: var(--cap-accent, #1e2bfa);
  }
  /* emphasis — a directional-red hairline underline (inline only, never a fill) */
  .caption-word.cap-cta {
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-decoration-color: var(--cap-accent-2, #dc2626);
    text-underline-offset: 0.1em;
  }

  @media (max-aspect-ratio: 9/16) {
    .caption-pill {
      max-width: 92%;
    }
    .caption-line {
      font-size: clamp(34px, 5.4vw, 48px);
    }
  }
</style>
