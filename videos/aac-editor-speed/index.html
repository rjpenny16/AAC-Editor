<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>AAC Editor — Six Buttons, One Pass</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Nunito";
        src: url("assets/fonts/Nunito-Black.ttf") format("truetype");
        font-style: normal;
        font-weight: 900;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #fff; }
      body { font-family: "Nunito", sans-serif; color: #102149; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
      .clip { position: absolute; inset: 0; overflow: hidden; }
      .base { background: #fff; }
      .scene { display: grid; place-items: center; }
      .blue-field { background: #0057ff; }
      .white-field { background: #fff; }
      .dot, .pill { position: absolute; z-index: 1; }
      .dot { width: 46px; height: 46px; border-radius: 50%; }
      .pill { width: 132px; height: 40px; border-radius: 999px; }
      .pink { background: #ff2d8a; }
      .lime { background: #7fff00; }
      .yellow { background: #ffe500; }
      .blue { background: #0057ff; }

      .sticker { position: relative; z-index: 5; font-weight: 900; line-height: .92; text-transform: uppercase; }
      .sticker::before { content: ""; position: absolute; inset: 14px -14px -14px 14px; z-index: -1; border-radius: inherit; background: #ff2d8a; }
      .sticker-white { padding: 50px 72px; border: 10px solid #0057ff; border-radius: 38px; background: #fff; color: #102149; box-shadow: 0 16px 0 rgba(0, 87, 255, .16); }
      .hot-tag { z-index: 7; padding: 20px 40px; border-radius: 18px; background: #ff2d8a; color: #fff; font-size: 44px; line-height: 1; box-shadow: 0 12px 0 rgba(16, 33, 73, .13); }

      #speed-hook { width: 1040px; text-align: center; font-size: 112px; }
      #speed-hook-tag { position: absolute; left: 1120px; top: 650px; }

      .app-window { position: absolute; z-index: 4; overflow: hidden; border: 10px solid #0057ff; border-radius: 34px; background: #fff; box-shadow: 18px 20px 0 #ff2d8a; will-change: transform; }
      .app-window img { display: block; width: 100%; height: 100%; object-fit: cover; }
      #speed-app { left: 350px; top: 120px; width: 1220px; height: 762px; }
      .word-chip { position: absolute; z-index: 8; min-width: 150px; padding: 18px 28px; border: 6px solid #0057ff; border-radius: 999px; background: #fff; color: #0057ff; font-size: 30px; text-align: center; box-shadow: 8px 9px 0 #ffe500; will-change: transform; }
      #word-pizza { left: 150px; top: 160px; }
      #word-pasta { left: 90px; top: 390px; }
      #word-sandwich { left: 150px; top: 650px; }
      #word-soup { right: 110px; top: 160px; }
      #word-snack { right: 70px; top: 410px; }
      #word-dessert { right: 135px; top: 680px; }
      .scene-kicker { position: absolute; left: 92px; top: 60px; z-index: 7; padding: 14px 24px; border-radius: 999px; background: #7fff00; color: #102149; font-size: 28px; }

      #speed-proof-copy { position: absolute; left: 100px; top: 190px; width: 650px; z-index: 8; }
      #speed-proof-copy .big { display: block; color: #fff; font-size: 132px; line-height: .86; letter-spacing: -4px; }
      #speed-proof-copy .pink-strip { display: inline-block; margin-top: 28px; padding: 16px 28px; border-radius: 16px; background: #ff2d8a; color: #fff; font-size: 42px; }
      #speed-action { right: 100px; top: 155px; width: 980px; height: 620px; border-color: #fff; box-shadow: 18px 20px 0 #ffe500; transform-origin: 50% 50%; }
      #speed-action { background: #fff url("assets/editor-workspace.png") right bottom / 1450px 906px no-repeat; }
      #speed-action-button { position: absolute; right: 145px; bottom: 110px; z-index: 10; width: 460px; height: 120px; display: grid; place-items: center; border: 8px solid #fff; border-radius: 28px; background: #0057ff; color: #fff; font-size: 43px; box-shadow: 0 16px 0 #ff2d8a; transform-origin: 50% 50%; }
      #speed-burst { position: absolute; right: 125px; bottom: 95px; z-index: 9; width: 500px; height: 150px; border-radius: 60px; background: radial-gradient(circle, rgba(255, 229, 0, .9), rgba(255, 229, 0, 0) 70%); opacity: 0; }

      #speed-final { width: 1580px; text-align: left; }
      #speed-final .line { display: block; font-size: 144px; line-height: .88; letter-spacing: -5px; }
      #speed-final .line-one { color: #102149; }
      #speed-final .line-two { margin-top: 24px; color: #0057ff; }
      #speed-final-brand { position: absolute; left: 180px; top: 805px; padding: 18px 30px; border-radius: 16px; background: #ff2d8a; color: #fff; font-size: 34px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="aac-speed" data-start="0" data-duration="15" data-width="1920" data-height="1080">
      <div id="speed-base" class="clip base" data-start="0" data-duration="15" data-track-index="0"></div>

      <section id="speed-scene-hook" class="clip scene blue-field" data-start="0" data-duration="3" data-track-index="1">
        <span class="dot pink" style="left:250px;top:160px"></span>
        <span class="pill lime" style="right:230px;top:190px"></span>
        <span class="dot yellow" style="right:320px;bottom:170px"></span>
        <div id="speed-hook" class="sticker sticker-white">Button by button?</div>
        <div id="speed-hook-tag" class="hot-tag">Not anymore</div>
      </section>

      <section id="speed-scene-editor" class="clip scene white-field" data-start="3" data-duration="5.2" data-track-index="2">
        <div class="scene-kicker">One connected workspace</div>
        <div id="speed-app" class="app-window"><img src="assets/editor-workspace.png" alt="TD Snap Page Builder editor" /></div>
        <div id="word-pizza" class="word-chip">Pizza</div>
        <div id="word-pasta" class="word-chip">Pasta</div>
        <div id="word-sandwich" class="word-chip">Sandwich</div>
        <div id="word-soup" class="word-chip">Soup</div>
        <div id="word-snack" class="word-chip">Snack</div>
        <div id="word-dessert" class="word-chip">Dessert</div>
      </section>

      <section id="speed-scene-action" class="clip scene blue-field" data-start="8.2" data-duration="3.6" data-track-index="3">
        <span class="dot pink" style="left:70px;bottom:110px"></span>
        <span class="pill lime" style="left:560px;top:120px"></span>
        <div id="speed-proof-copy">
          <span class="big">6 buttons.</span>
          <span class="big">1 pass.</span>
          <span class="pink-strip">Bulk edit → review → update</span>
        </div>
        <div id="speed-action" class="app-window" aria-label="TD Snap Page Builder update action"></div>
        <div id="speed-burst" data-layout-allow-overflow></div>
        <div id="speed-action-button">Update TD Snap</div>
      </section>

      <section id="speed-scene-outcome" class="clip scene white-field" data-start="11.8" data-duration="3.2" data-track-index="4">
        <span class="dot yellow" style="left:100px;top:150px"></span>
        <span class="pill lime" style="right:110px;top:170px"></span>
        <span class="dot pink" style="right:250px;bottom:190px"></span>
        <div id="speed-final">
          <span id="speed-final-one" class="line line-one">Less editing.</span>
          <span id="speed-final-two" class="line line-two">More communicating.</span>
        </div>
        <div id="speed-final-brand">TD Snap Page Builder</div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo("#speed-hook", { scale: 0, opacity: 0, rotation: -8 }, { scale: 1, opacity: 1, rotation: -2, duration: .62, ease: "back.out(1.7)" }, .18);
      tl.fromTo("#speed-hook-tag", { scale: 0, opacity: 0, rotation: 10 }, { scale: 1, opacity: 1, rotation: 4, duration: .48, ease: "back.out(1.8)" }, .78);

      tl.fromTo("#speed-app", { x: 620, scale: .82, opacity: 0, rotation: 7 }, { x: 0, scale: 1, opacity: 1, rotation: -1.5, duration: .82, ease: "power3.out" }, 3.12);
      const speedWords = ["#word-pizza", "#word-pasta", "#word-sandwich", "#word-soup", "#word-snack", "#word-dessert"];
      speedWords.forEach((selector, i) => {
        tl.fromTo(selector, { scale: 0, opacity: 0, rotation: i % 2 ? 8 : -8 }, { scale: 1, opacity: 1, rotation: i % 2 ? 3 : -3, duration: .45, ease: "back.out(1.55)" }, 4.25 + i * .55);
      });

      tl.fromTo("#speed-proof-copy", { x: -260, opacity: 0 }, { x: 0, opacity: 1, duration: .62, ease: "power3.out" }, 8.35);
      tl.fromTo("#speed-action", { x: 520, opacity: 0, rotation: -6 }, { x: 0, opacity: 1, rotation: 2, duration: .72, ease: "power3.out" }, 8.55);
      tl.fromTo("#speed-action-button", { scale: 0, opacity: 0, rotation: 5 }, { scale: 1, opacity: 1, rotation: -2, duration: .52, ease: "back.out(1.6)" }, 9.35);
      tl.to("#speed-action-button", { scale: .92, duration: .16, ease: "power1.in" }, 10.1);
      tl.to("#speed-action-button", { scale: 1, duration: .5, ease: "back.out(1.65)" }, 10.26);
      tl.fromTo("#speed-burst", { scale: 1, opacity: 0 }, { scale: 4.5, opacity: .72, duration: .55, ease: "power2.out" }, 10.26);
      tl.to("#speed-burst", { opacity: 0, duration: .45, ease: "power2.in" }, 10.81);

      tl.fromTo("#speed-final-one", { x: -260, opacity: 0, rotation: -4 }, { x: 0, opacity: 1, rotation: -1, duration: .58, ease: "power3.out" }, 11.98);
      tl.fromTo("#speed-final-two", { x: 320, opacity: 0, scale: .8, rotation: 4 }, { x: 0, opacity: 1, scale: 1, rotation: 1, duration: .7, ease: "back.out(1.45)" }, 12.58);
      tl.fromTo("#speed-final-brand", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: .45, ease: "back.out(1.5)" }, 13.35);

      window.__timelines["aac-speed"] = tl;
    </script>
  </body>
</html>
