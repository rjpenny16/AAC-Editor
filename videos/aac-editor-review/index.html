<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>AAC Editor — Review Before You Run</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Nunito";
        src: url("assets/fonts/Nunito-Black.ttf") format("truetype");
        font-style: normal;
        font-weight: 900;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #fff; }
      body { font-family: "Nunito", sans-serif; color: #102149; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
      .clip { position: absolute; inset: 0; overflow: hidden; }
      .base { background: #fff; }
      .scene { display: grid; place-items: center; }
      .blue-field { background: #0057ff; }
      .white-field { background: #fff; }
      .dot, .pill { position: absolute; z-index: 1; }
      .dot { width: 48px; height: 48px; border-radius: 50%; }
      .pill { width: 140px; height: 42px; border-radius: 999px; }
      .pink { background: #ff2d8a; }
      .lime { background: #7fff00; }
      .yellow { background: #ffe500; }
      .blue { background: #0057ff; }

      .stack-title { position: relative; z-index: 5; width: 1370px; text-align: left; font-size: 130px; line-height: .86; text-transform: uppercase; }
      .stack-title .blue-sticker, .stack-title .pink-sticker { display: inline-block; padding: 32px 48px; border-radius: 30px; }
      .stack-title .blue-sticker { border: 10px solid #fff; background: #0057ff; color: #fff; box-shadow: 15px 16px 0 #ffe500; }
      .stack-title .pink-sticker { margin-top: 24px; margin-left: 260px; border: 10px solid #fff; background: #ff2d8a; color: #fff; box-shadow: 15px 16px 0 #7fff00; }

      .split-stage { position: relative; z-index: 4; display: flex; align-items: center; gap: 80px; perspective: 1800px; transform-style: preserve-3d; }
      .proof-card { width: 760px; height: 620px; padding: 28px; border: 10px solid #0057ff; border-radius: 38px; background: #fff; transform-style: preserve-3d; will-change: transform; }
      .proof-card.left { box-shadow: -18px 20px 0 #ff2d8a; }
      .proof-card.right { box-shadow: 18px 20px 0 #ffe500; }
      .crop { height: 420px; overflow: hidden; border: 5px solid #102149; border-radius: 24px; background: #fff; }
      .crop { background-image: url("assets/editor-workspace.png"); background-repeat: no-repeat; background-size: cover; }
      .left .crop { background-position: left center; }
      .right .crop { background-position: right center; }
      .card-label { margin-top: 30px; color: #0057ff; font-size: 48px; line-height: .95; text-align: center; text-transform: uppercase; }
      .left .card-label span { color: #ff2d8a; }
      .right .card-label span { color: #102149; }
      .split-kicker { position: absolute; left: 90px; top: 56px; z-index: 7; padding: 14px 26px; border-radius: 999px; background: #7fff00; color: #102149; font-size: 28px; }

      #review-draw-stage { position: relative; width: 1500px; height: 760px; }
      .mini-proof { position: absolute; top: 190px; width: 540px; height: 380px; padding: 22px; border: 9px solid #fff; border-radius: 34px; background: #fff; box-shadow: 15px 16px 0 #ff2d8a; }
      .mini-proof.left { left: 30px; }
      .mini-proof.right { right: 30px; box-shadow: 15px 16px 0 #ffe500; }
      .mini-crop { width: 100%; height: 250px; border-radius: 18px; background: #fff url("assets/editor-workspace.png") center / cover no-repeat; }
      .mini-proof.left .mini-crop { background-position: left center; }
      .mini-proof.right .mini-crop { background-position: right center; }
      .mini-proof strong { display: block; margin-top: 16px; color: #0057ff; font-size: 38px; text-align: center; text-transform: uppercase; }
      #review-check-svg { position: absolute; left: 585px; top: 165px; width: 330px; height: 330px; overflow: visible; }
      #review-check-path { fill: none; stroke: #7fff00; stroke-width: 42; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(10px 12px 0 #102149); }
      #reviewed-tag { position: absolute; left: 635px; top: 520px; padding: 18px 34px; border: 7px solid #fff; border-radius: 18px; background: #7fff00; color: #102149; font-size: 42px; text-transform: uppercase; box-shadow: 10px 11px 0 #ff2d8a; }

      #review-final { width: 1520px; text-align: left; }
      #review-final .line { display: inline-block; padding: 20px 34px; border-radius: 24px; font-size: 132px; line-height: .88; text-transform: uppercase; }
      #review-final-one { border: 10px solid #0057ff; background: #fff; color: #0057ff; box-shadow: 14px 16px 0 #ffe500; }
      #review-final-two { margin-top: 24px; margin-left: 400px; border: 10px solid #fff; background: #ff2d8a; color: #fff; box-shadow: 14px 16px 0 #0057ff; }
      #review-action-crop { position: absolute; left: 1150px; top: 700px; width: 570px; height: 150px; overflow: hidden; border: 8px solid #0057ff; border-radius: 26px; background: #fff; box-shadow: 12px 13px 0 #7fff00; }
      #review-action-crop { background: #fff url("assets/editor-workspace.png") right bottom / 880px 550px no-repeat; }
      #review-brand { position: absolute; left: 180px; top: 790px; padding: 16px 28px; border-radius: 16px; background: #0057ff; color: #fff; font-size: 32px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="aac-review" data-start="0" data-duration="15" data-width="1920" data-height="1080">
      <div id="review-base" class="clip base" data-start="0" data-duration="15" data-track-index="0"></div>

      <section id="review-scene-hook" class="clip scene white-field" data-start="0" data-duration="3.2" data-track-index="1">
        <span class="dot pink" style="left:150px;top:150px"></span>
        <span class="pill lime" style="right:190px;top:170px"></span>
        <span class="dot yellow" style="right:320px;bottom:160px"></span>
        <div class="stack-title">
          <span id="review-hook-one" class="blue-sticker">See it before</span>
          <span id="review-hook-two" class="pink-sticker">you run it</span>
        </div>
      </section>

      <section id="review-scene-proof" class="clip scene white-field" data-start="3.2" data-duration="5.4" data-track-index="2">
        <div class="split-kicker">Two checks. One confident update.</div>
        <div class="split-stage">
          <article id="review-card-left" class="proof-card left">
            <div class="crop" aria-label="Existing and new vocabulary in the editor"></div>
            <div class="card-label"><span>Existing words</span> stay locked</div>
          </article>
          <article id="review-card-right" class="proof-card right">
            <div class="crop" aria-label="Exact page-grid placement preview"></div>
            <div class="card-label"><span>Exact placement</span> stays yours</div>
          </article>
        </div>
      </section>

      <section id="review-scene-confirm" class="clip scene blue-field" data-start="8.6" data-duration="3.2" data-track-index="3">
        <div id="review-draw-stage">
          <article id="review-mini-left" class="mini-proof left">
            <div class="mini-crop" aria-label="Button list review"></div><strong>Words checked</strong>
          </article>
          <article id="review-mini-right" class="mini-proof right">
            <div class="mini-crop" aria-label="Grid placement review"></div><strong>Placement checked</strong>
          </article>
          <svg id="review-check-svg" viewBox="0 0 300 300" aria-hidden="true"><path id="review-check-path" d="M 52 158 L 118 224 L 250 75" /></svg>
          <div id="reviewed-tag">Reviewed</div>
        </div>
      </section>

      <section id="review-scene-outcome" class="clip scene white-field" data-start="11.8" data-duration="3.2" data-track-index="4">
        <span class="dot pink" style="left:95px;top:130px"></span>
        <span class="pill yellow" style="right:100px;top:145px"></span>
        <div id="review-final">
          <span id="review-final-one" class="line">Review.</span>
          <span id="review-final-two" class="line">Then update.</span>
        </div>
        <div id="review-action-crop" aria-label="Update TD Snap action"></div>
        <div id="review-brand">TD Snap Page Builder</div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const checkPath = document.getElementById("review-check-path");
      const checkLength = checkPath.getTotalLength();
      checkPath.style.strokeDasharray = String(checkLength);
      checkPath.style.strokeDashoffset = String(checkLength);

      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#review-hook-one", { scale: 0, opacity: 0, rotation: -7 }, { scale: 1, opacity: 1, rotation: -2, duration: .62, ease: "back.out(1.65)" }, .18);
      tl.fromTo("#review-hook-two", { scale: 0, opacity: 0, rotation: 7 }, { scale: 1, opacity: 1, rotation: 2, duration: .52, ease: "back.out(1.7)" }, .82);

      tl.fromTo("#review-card-left", { x: -520, rotateY: 24, opacity: 0 }, { x: 0, rotateY: 12, opacity: 1, duration: .88, ease: "power3.out" }, 3.35);
      tl.fromTo("#review-card-right", { x: 520, rotateY: -24, opacity: 0 }, { x: 0, rotateY: -12, opacity: 1, duration: .88, ease: "power3.out" }, 3.62);
      tl.fromTo("#review-card-left .card-label", { y: 28, opacity: 0 }, { y: 0, opacity: 1, duration: .5, ease: "power2.out" }, 5.0);
      tl.fromTo("#review-card-right .card-label", { y: 28, opacity: 0 }, { y: 0, opacity: 1, duration: .5, ease: "power2.out" }, 6.05);

      tl.fromTo("#review-mini-left", { x: -360, opacity: 0, rotation: -8 }, { x: 0, opacity: 1, rotation: -3, duration: .6, ease: "power3.out" }, 8.75);
      tl.fromTo("#review-mini-right", { x: 360, opacity: 0, rotation: 8 }, { x: 0, opacity: 1, rotation: 3, duration: .6, ease: "power3.out" }, 8.92);
      tl.to("#review-check-path", { strokeDashoffset: 0, duration: .72, ease: "power2.out" }, 9.55);
      tl.fromTo("#reviewed-tag", { scale: 0, opacity: 0, rotation: 8 }, { scale: 1, opacity: 1, rotation: -2, duration: .5, ease: "back.out(1.7)" }, 10.28);

      tl.fromTo("#review-final-one", { x: -280, opacity: 0, rotation: -5 }, { x: 0, opacity: 1, rotation: -1, duration: .58, ease: "power3.out" }, 11.98);
      tl.fromTo("#review-final-two", { x: 360, opacity: 0, rotation: 6 }, { x: 0, opacity: 1, rotation: 2, duration: .64, ease: "back.out(1.5)" }, 12.52);
      tl.fromTo("#review-action-crop", { scale: 0, opacity: 0, rotation: -5 }, { scale: 1, opacity: 1, rotation: 2, duration: .48, ease: "back.out(1.55)" }, 13.15);
      tl.fromTo("#review-brand", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: .4, ease: "power3.out" }, 13.55);

      window.__timelines["aac-review"] = tl;
    </script>
  </body>
</html>
