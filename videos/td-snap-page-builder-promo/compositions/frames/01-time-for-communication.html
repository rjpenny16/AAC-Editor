        </div>

        <div data-hf-id="hf-ttel" id="f01-beat-3" class="f01-beat f01-beat-three">
          <span data-hf-id="hf-231v" class="f01-word f01-from" data-word="from">from</span>
          <span data-hf-id="hf-8vau" class="f01-word f01-keyword" data-word="communicating">communicating</span>
        </div>

      <div data-hf-id="hf-n9jc" id="f01-workspace" class="f01-workspace">

    <div data-hf-id="hf-nuww" class="clip f01-progress" data-start="0" data-duration="5.9" data-track-index="2" aria-hidden="true"></div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const WORDS = [
        { id: "#f01-word-editing", text: "Editing", speedFactor: 1, hold: 0.02 },
        { id: "#f01-word-aac", text: "AAC", speedFactor: 1, hold: 0.02 },
        { id: "#f01-word-pages", text: "pages", speedFactor: 1, hold: 0.02 },
      ];
      let wordCursor = 0.02;
      const WORD_TIMELINE = WORDS.map((entry) => {
        const duration = 0.24 + entry.text.length * 0.025 / entry.speedFactor + entry.hold;
        const start = wordCursor;
        wordCursor += 0.05 + entry.text.length * 0.012;
        return { ...entry, start, duration };
      });

      WORD_TIMELINE.forEach((entry) => {
        tl.fromTo(
          entry.id,
          { y: 42, opacity: 0, filter: "blur(10px)" },
          { y: 0, opacity: 1, filter: "blur(0px)", duration: entry.duration, ease: "power3.out" },
          entry.start,
        );
      });

      tl.set("#f01-beat-1", { opacity: 0 }, 1.2);
      tl.set("#f01-beat-2", { opacity: 1 }, 1.2);
      tl.set("#f01-beat-2", { opacity: 0 }, 3.3);
      tl.set("#f01-beat-3", { opacity: 1 }, 3.3);

      const TEXT_STATES = [
        { t: 0, text: "" },
        { t: 1.2, text: "should not take time" },
        { t: 2.15, text: "away" },
      ];
      const textAt = (time) => {
        for (let i = TEXT_STATES.length - 1; i >= 0; i -= 1) {
          if (time >= TEXT_STATES[i].t) return TEXT_STATES[i].text;
        }
        return "";
      };

      const TIMINGS = {
        from: { start: 3.3, end: 3.56 },
        communicating: { start: 3.62, end: 4.05 },
      };
      const ATTACK = 0.14;
      const RELEASE = 0.3;
      const REST_LEVEL = 0.16;
      const envelope = (time, start, end) => {
        if (time < start) return 0;
        if (time < end) return Math.min((time - start) / ATTACK, 1);
        if (time < end + RELEASE) {
          return 1 - ((time - end) / RELEASE) * (1 - REST_LEVEL);
        }
        return REST_LEVEL;
      };
      const lerp = (a, b, amount) => Math.round(a + (b - a) * amount);

      const beatTwo = document.getElementById("f01-beat-2");
      const glowWords = document.querySelectorAll(".f01-word");
      let lastText = null;
      const driver = { t: 0 };
      tl.to(
        driver,
        {
          t: 5.5,
          duration: 5.5,
          ease: "none",
          onUpdate: () => {
            const nextText = textAt(driver.t);
            if (nextText !== lastText) {
              beatTwo.textContent = nextText;
              lastText = nextText;
            }

            glowWords.forEach((word) => {
              const timing = TIMINGS[word.dataset.word];
              const env = envelope(driver.t, timing.start, timing.end);
              const isKeyword = word.dataset.word === "communicating";
              const colorAmount = isKeyword
                ? Math.min(Math.max((driver.t - timing.start) / ATTACK, 0), 1)
                : env;
              const rest = isKeyword ? [29, 29, 31] : [85, 85, 90];
              const active = isKeyword ? [0, 113, 227] : [29, 29, 31];
              word.style.color = `rgb(${lerp(rest[0], active[0], colorAmount)}, ${lerp(rest[1], active[1], colorAmount)}, ${lerp(rest[2], active[2], colorAmount)})`;
              word.style.textShadow = `0 0 ${18 * env}px rgba(0, 113, 227, ${0.04 + 0.18 * env})`;
              word.style.transform = `scale(${1 + 0.04 * env})`;
            });
          },
        },
        0,
      );

      const blurNode = document.getElementById("f01-workspace-blur");
      const blurProxy = { value: 20 };
      const writeBlur = () => blurNode.setAttribute("stdDeviation", `${blurProxy.value} 0`);
      writeBlur();

      tl.fromTo(
        "#f01-workspace",
        { x: 420, opacity: 0 },
        { x: 0, opacity: 0.96, duration: 0.5, ease: "power4.out" },
        3.38,
      );
      tl.to(
        blurProxy,
        { value: 0, duration: 0.5, ease: "power4.out", onUpdate: writeBlur },
        3.38,
      );

      window.__timelines["01-time-for-communication"] = tl;
    </script>
