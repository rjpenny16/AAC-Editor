  <script>
    window.__timelines = window.__timelines || {};

    const tl = gsap.timeline({ paused: true });
    const root = document.querySelector('[data-composition-id="03-whole-vocabulary"]');
    const viewport = document.getElementById("f03-viewport");
    const zoomOuter = document.getElementById("f03-zoom-outer");
    const zoomInner = document.getElementById("f03-zoom-inner");
    const targetRegion = document.getElementById("f03-target-region");
    const previewRegion = document.getElementById("f03-preview-region");

    const rootRect = root.getBoundingClientRect();
    const targetRect = targetRegion.getBoundingClientRect();
    const previewRect = previewRegion.getBoundingClientRect();
    const centerX = rootRect.left + rootRect.width / 2;
    const centerY = rootRect.top + rootRect.height / 2;
    const targetOffsetX = targetRect.left + targetRect.width / 2 - centerX;
    const targetOffsetY = targetRect.top + targetRect.height / 2 - centerY;
    const maxTargetScale = Math.min(
      (0.88 * rootRect.width) / targetRect.width,
      (0.88 * rootRect.height) / targetRect.height,
    );
    const targetScale = Math.min(1.3, maxTargetScale);

    const previewOffsetX = previewRect.left + previewRect.width / 2 - centerX;
    const previewOffsetY = previewRect.top + previewRect.height / 2 - centerY;
    const finalScale = 0.98;
    const focusScreenX = 1480;
    const focusScreenY = 430;
    const finalX = focusScreenX - rootRect.width / 2 - previewOffsetX * finalScale;
    const finalY = focusScreenY - rootRect.height / 2 - previewOffsetY * finalScale;

    const cam = { scale: 1, x: 0, y: 0 };
    function applyViewport() {
      viewport.style.transform = `translate(${cam.x}px, ${cam.y}px) scale(${cam.scale})`;
    }
    applyViewport();

    tl.fromTo(
      "#f03-surface-wrap",
      { opacity: 0, x: 90, y: 24, scale: 0.97 },
      { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.82, ease: "power3.out" },
      0.05,
    );

    tl.fromTo(
      ".eyebrow, .accent-line",
      { opacity: 0, y: 14 },
      { opacity: 1, y: 0, duration: 0.5, stagger: 0.08, ease: "power3.out" },
      0.12,
    );

    const headlineItems = [
      { text: "Add", hold: 0.05 },
      { text: "many", hold: 0.05 },
      { text: "words", hold: 0.12 },
    ];
    let wordCursor = 0.18;
    const wordSchedule = headlineItems.map((item) => {
      const start = wordCursor;
      const duration = 0.1 + item.text.length * 0.025 + item.hold;
      wordCursor += duration;
      return { ...item, start, end: wordCursor };
    });

    gsap.utils.toArray("#f03-headline .f03-word").forEach((word, index) => {
      tl.fromTo(
        word,
        { opacity: 0, y: 34 },
        { opacity: 1, y: 0, duration: 0.58, ease: "power4.out" },
        wordSchedule[index].start,
      );
    });

    tl.to(
      zoomOuter,
      { scale: targetScale, duration: 1.35, ease: "power3.inOut" },
      1.8,
    );
    tl.to(
      zoomInner,
      {
        x: -targetOffsetX,
        y: -targetOffsetY,
        duration: 1.35,
        ease: "power3.inOut",
      },
      1.8,
    );

    tl.fromTo(
      "#f03-target-highlight",
      { opacity: 0, scale: 0.96 },
      { opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" },
      1.95,
    );
    tl.fromTo(
      ".example-chip",
      { opacity: 0, y: 16, scale: 0.9 },
      {
        opacity: 1,
        y: 0,
        scale: 1,
        duration: 0.48,
        stagger: 0.1,
        ease: "power3.out",
      },
      2.15,
    );

    tl.to(
      zoomOuter,
      { scale: 1, duration: 1.35, ease: "power3.inOut" },
      4.2,
    );
    tl.to(
      zoomInner,
      { x: 0, y: 0, duration: 1.35, ease: "power3.inOut" },
      4.2,
    );
    tl.to(
      cam,
      {
        scale: finalScale,
        x: finalX,
        y: finalY,
        duration: 1.35,
        ease: "power3.inOut",
        onUpdate: applyViewport,
      },
      4.2,
    );

    tl.fromTo(
      "#f03-preview-region",
      { opacity: 0, scale: 0.98 },
      { opacity: 1, scale: 1, duration: 0.62, ease: "power3.out" },
      4.48,
    );
    tl.fromTo(
      "#f03-existing-pill",
      { opacity: 0, x: -34 },
      { opacity: 1, x: 0, duration: 0.56, ease: "power4.out" },
      4.58,
    );
    tl.fromTo(
      "#f03-new-pill",
      { opacity: 0, x: -34 },
      { opacity: 1, x: 0, duration: 0.56, ease: "power4.out" },
      4.82,
    );

      "#f03-all-once",

      { opacity: 1, y: 0, duration: 0.68, ease: "power3.out" },

    );

    tl.fromTo(

      0,

    window.__timelines["03-whole-vocabulary"] = tl;
  </script>
