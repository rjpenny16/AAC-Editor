name: Release

# Releases are always built from an existing vX.Y.Z tag and signed by SignPath.
# Missing signing configuration is a hard failure; unsigned artifacts are never
# attached to a GitHub release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to build (for example v2.2.0)"
        required: true
        default: "v2.2.0"

permissions:
  actions: read
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
    steps:
      - name: Check out the exact release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packaging/release-constraints.txt

      - name: Validate tag, source version, and signing configuration
        id: version
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_APP_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_APP_ARTIFACT_CONFIGURATION_SLUG }}
          SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must have the form vX.Y.Z: $env:RELEASE_TAG"
          }
          $headTag = git describe --exact-match --tags HEAD
          if ($LASTEXITCODE -ne 0) {
            throw "Checked-out source is not an exact tag."
          }
          $headTag = $headTag.Trim()
          if ($headTag -ne $env:RELEASE_TAG) {
            throw "Checked-out source is $headTag, not $env:RELEASE_TAG."
          }
          $version = (python -c "import tdsnap; print(tdsnap.__version__)").Trim()
          if ("v$version" -ne $env:RELEASE_TAG) {
            throw "Source version $version does not match tag $env:RELEASE_TAG."
          }
          $required = @(
            "SIGNPATH_API_TOKEN",
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_APP_ARTIFACT_CONFIGURATION_SLUG",
            "SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG"
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Required release signing setting is missing: $name"
            }
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install pinned release inputs
        shell: pwsh
        run: |
          choco install innosetup --version=6.7.1 --yes --no-progress
          python -m pip install --constraint packaging/release-constraints.txt pip
          python -m pip install --constraint packaging/release-constraints.txt ".[ai,desktop,dev]" pyinstaller --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Run tests, including the real-model smoke test
        env:
          TDSNAP_AI_SMOKE: "1"
        run: python -m pytest

      - name: Build unsigned application bundle
        shell: pwsh
        run: ./packaging/build.ps1 -Version ${{ steps.version.outputs.version }} -Stage App

      - name: Upload application executable for signing
        id: upload-app
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          name: unsigned-app
          path: dist/AACEditor/AAC Editor.exe

      - name: Sign application executable with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_APP_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-app.outputs.artifact-id }}
          skip-decompress: true
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}\dist\signed-app

      - name: Verify and stage signed application executable
        shell: pwsh
        run: |
          $signed = @(Get-ChildItem dist/signed-app -Recurse -Filter "AAC Editor.exe")
          if ($signed.Count -ne 1) { throw "Expected one signed app, found $($signed.Count)." }
          Copy-Item -LiteralPath $signed[0].FullName -Destination "dist/AACEditor/AAC Editor.exe" -Force
          $signature = Get-AuthenticodeSignature -LiteralPath "dist/AACEditor/AAC Editor.exe"
          if ($signature.Status -ne "Valid") { throw "App signature is $($signature.Status)." }
          ./packaging/verify_manifest.ps1 -Executable "dist/AACEditor/AAC Editor.exe"

      - name: Build installer around signed application
        shell: pwsh
        run: ./packaging/build.ps1 -Version ${{ steps.version.outputs.version }} -Stage Installer

      - name: Upload installer for signing
        id: upload-installer
        uses: actions/upload-artifact@v7
        with:
          archive: false
          if-no-files-found: error
          name: unsigned-installer
          path: dist/installer/AACEditor-${{ steps.version.outputs.version }}-windows-x64-setup.exe

      - name: Sign installer with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-installer.outputs.artifact-id }}
          skip-decompress: true
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}\dist\signed-installer

      - name: Verify signed installer
        id: package
        shell: pwsh
        run: |
          $name = "AACEditor-${{ steps.version.outputs.version }}-windows-x64-setup.exe"
          $signed = @(Get-ChildItem dist/signed-installer -Recurse -Filter $name)
          if ($signed.Count -ne 1) { throw "Expected one signed installer, found $($signed.Count)." }
          $installer = "dist/installer/$name"
          Copy-Item -LiteralPath $signed[0].FullName -Destination $installer -Force
          $signature = Get-AuthenticodeSignature -LiteralPath $installer
          if ($signature.Status -ne "Valid") { throw "Installer signature is $($signature.Status)." }
          "installer=$installer" >> $env:GITHUB_OUTPUT

      - name: Install and smoke-test signed package
        shell: pwsh
        run: ./packaging/smoke_test.ps1 -Installer ${{ steps.package.outputs.installer }} -ExpectedVersion ${{ steps.version.outputs.version }} -AllowInstall

      - name: Write SHA-256 checksum
        shell: pwsh
        run: |
          $installer = "${{ steps.package.outputs.installer }}"
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $installer -Leaf)" | Set-Content -Encoding ascii "$installer.sha256"

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.installer }}

      - name: Attach signed installer to draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.installer }}
            ${{ steps.package.outputs.installer }}.sha256
