name: Release

# Tag a version (e.g. `git tag v2.1.0 && git push --tags`) — or run this
# workflow manually with a tag name — and this builds the packaged Windows
# app and attaches it to a draft GitHub Release, so users can download and
# double-click without installing Python.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create (e.g. v2.1.0)"
        required: true
        default: "v2.1.0"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies (with built-in AI engine)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pywebview
          pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Run tests (including real-model AI smoke test)
        env:
          TDSNAP_AI_SMOKE: "1"
        run: |
          pip install pytest
          python -m pytest

      - name: Build app
        run: pyinstaller packaging/tdsnap.spec --noconfirm

      - name: Package build
        id: package
        shell: pwsh
        run: |
          $archive = "AACEditor-${{ inputs.tag_name || github.ref_name }}-windows-x64.zip"
          Compress-Archive -Path "dist/AACEditor" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive" | Set-Content -Encoding ascii "$archive.sha256"
          "archive=$archive" >> $env:GITHUB_OUTPUT

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
