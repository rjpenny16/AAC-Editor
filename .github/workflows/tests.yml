name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run unit tests
        run: python -m pytest -v

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint
        run: ruff check tdsnap tests packaging scripts

      - name: Test with coverage floor
        run: |
          coverage run -m pytest
          coverage report

      - name: Audit project dependencies
        run: python -m pip_audit .

  # The integration tests exercise a real TD Snap export (proprietary Tobii
  # content, downloaded rather than committed).
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[ai,dev]" --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Fetch real page-set fixture
        run: python scripts/fetch_fixture.py

      - name: Run integration tests and real-model AI smoke test
        env:
          TDSNAP_AI_SMOKE: "1"
        run: python -m pytest -v tests/test_integration_example.py tests/test_ai_smoke.py

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run Windows tests
        run: python -m pytest -v

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          pip install .
          npm ci
          npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:e2e
