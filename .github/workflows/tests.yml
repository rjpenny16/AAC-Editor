name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest -v

  # The integration tests exercise a real TD Snap export (proprietary Tobii
  # content, downloaded rather than committed). Soft-fail: a broken download
  # shouldn't block unrelated changes, but a red run here means the editor
  # no longer produces valid files.
  integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Fetch real page-set fixture
        run: python scripts/fetch_fixture.py

      - name: Install built-in AI engine
        run: pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Run integration tests and real-model AI smoke test
        env:
          TDSNAP_AI_SMOKE: "1"
        run: python -m pytest -v tests/test_integration_example.py tests/test_ai_smoke.py
